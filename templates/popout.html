<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ symbol }} · Joshua Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/css/style.css" />
<style>
  /* Popout-specific overrides */
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  .popout-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
  }

  /* Slim topbar */
  .popout-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    padding: 0 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }
  .popout-bar .logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .popout-bar .logo-mark { color: var(--accent); font-size: 10px; }

  .popout-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .popout-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    cursor: pointer;
  }
  .popout-symbol {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 8px;
    width: 100px;
  }
  .popout-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    transition: color 0.15s;
  }
  .popout-btn:hover { color: var(--accent); }

  /* Chart fills remaining space */
  .popout-chart-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .popout-chart-wrap .pane {
    position: absolute;
    inset: 0;
    border: none;
    border-radius: 0;
  }
  .popout-chart-wrap .pane-toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="popout-wrap">

  <!-- Slim bar -->
  <div class="popout-bar">
    <div class="logo">
      <span class="logo-mark">▲</span>
      <span>JOSHUA <span style="opacity:0.5;font-weight:400">TERMINAL</span></span>
    </div>
    <div class="popout-controls">
      <div class="connection-status" style="gap:5px">
        <span class="dot" id="pop-dot-hl" title="Hyperliquid"></span>
        <span class="conn-label">HL</span>
        <span class="dot" id="pop-dot-yf" title="YFinance"></span>
        <span class="conn-label">YF</span>
        <span class="dot" id="pop-dot-oanda" title="OANDA"></span>
        <span class="conn-label">OANDA</span>
      </div>
      <span id="pop-clock" style="font-family:var(--font-mono);font-size:10px;color:var(--text3)"></span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="popout-btn" id="pop-theme" title="Toggle theme">☾</button>
      <button class="popout-btn" id="pop-fullscreen" title="Fullscreen">⛶</button>
    </div>
  </div>

  <!-- Chart area — pane injected here -->
  <div class="popout-chart-wrap" id="popout-chart-wrap"></div>

</div>

<!-- ── Indicator flyout (mirrors index.html) ── -->
<div class="indicator-flyout" id="indicator-flyout">
  <div class="flyout-header">
    <span class="flyout-title">INDICATORS</span>
    <button class="flyout-close" id="flyout-close">✕</button>
  </div>
  <div class="flyout-body" id="flyout-body"></div>
</div>

<!-- ── Drawing tools flyout (mirrors index.html) ── -->
<div class="drawing-flyout" id="drawing-flyout">
  <div class="flyout-header">
    <span class="flyout-title">DRAWING TOOLS</span>
    <button class="flyout-close" id="draw-flyout-close">✕</button>
  </div>
  <div class="flyout-body" id="draw-flyout-body"></div>
</div>

<div class="flyout-backdrop" id="flyout-backdrop"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
  // ── lightweight-charts version guard ──────────────────────────────────────
  // v5+ changed to a restrictive non-commercial licence (source-available).
  // This project requires v4.x (Apache 2.0). Halt loudly if a future CDN
  // update or manual change sneaks in a breaking version.
  (function () {
    var ver = (window.LightweightCharts && window.LightweightCharts.version)
               ? window.LightweightCharts.version()
               : null;
    if (!ver) { console.error('[JT] Could not detect lightweight-charts version.'); return; }
    var major = parseInt(ver.split('.')[0], 10);
    if (major >= 5) {
      document.body.innerHTML =
        '<div style="font-family:monospace;padding:40px;color:#ff3d5a;background:#0a0c0f;height:100vh">' +
        '<h2>⚠ Incompatible library version</h2>' +
        '<p>lightweight-charts v' + ver + ' is loaded, but Joshua Terminal requires v4.x (Apache 2.0 licence).</p>' +
        '<p>v5+ uses a restrictive non-commercial licence incompatible with this open-source project.</p>' +
        '<p>Pin the CDN URL to: <code>lightweight-charts@4.1.3</code></p>' +
        '</div>';
      throw new Error('[JT] lightweight-charts v' + ver + ' detected — v4.x required. See licence notes in index.html.');
    }
  })();
</script>
<script src="/static/js/indicators.js"></script>
<script src="/static/js/state_store.js"></script>
<script src="/static/js/alert_engine.js"></script>
<script src="/static/js/pane.js"></script>
<script>
(function () {
  // ── Read URL params ─────────────────────────────────────────────────────────
  const params   = new URLSearchParams(location.search);
  const symbol   = params.get('symbol')   || 'EUR/USD';
  const interval = params.get('interval') || '15m';
  const source   = params.get('source')   || 'oanda';

  document.title = `${symbol} · Joshua Terminal`;

  // ── Theme ───────────────────────────────────────────────────────────────────
  const themeBtn = document.getElementById('pop-theme');
  const applyTheme = (theme) => {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'light' ? '☾' : '☀';
    localStorage.setItem('theme', theme);
    if (window._popPane) {
      const isDark = theme === 'dark';
      window._popPane.applyTheme(
        isDark ? '#0a0c0f' : '#f0f2f5',
        isDark ? '#7a8599' : '#4a5568',
        isDark ? '#454f63' : '#8896a8'
      );
    }
  };
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });
  applyTheme(localStorage.getItem('theme') || 'dark');

  // ── Fullscreen ──────────────────────────────────────────────────────────────
  document.getElementById('pop-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });

  // ── Clock ───────────────────────────────────────────────────────────────────
  const clockEl = document.getElementById('pop-clock');
  function updateClock() {
    const now = new Date();
    const utc = now.toUTCString().slice(17, 22);
    clockEl.textContent = `UTC ${utc}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Socket ──────────────────────────────────────────────────────────────────
  const socket = io();

  function setDot(id, cls) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'dot' + (cls ? ' ' + cls : '');
  }

  socket.on('connect', () => {
    setDot('pop-dot-hl', 'live');
    setDot('pop-dot-yf', 'live');
  });
  socket.on('disconnect', () => {
    setDot('pop-dot-hl', '');
    setDot('pop-dot-yf', '');
    setDot('pop-dot-oanda', '');
  });

  // ── Live price routing → pane.onPriceUpdate() ──────────────────────────────
  // (mirrors app.js socket handlers — popout doesn't load app.js)
  const _norm = s => s.replace(/[\/_-]/g, '').toUpperCase();

  socket.on('hl_mids', data => {
    const map = {};
    (data.updates || []).forEach(t => { map[t.symbol] = t; });
    if (pane && pane.source === 'hyperliquid' && map[pane.symbol]) {
      pane.onPriceUpdate(map[pane.symbol]);
    }
  });

  socket.on('oanda_price', data => {
    setDot('pop-dot-oanda', 'live');
    if (pane && pane.source !== 'hyperliquid' && _norm(pane.symbol) === _norm(data.symbol)) {
      pane.onPriceUpdate(data);
    }
  });

  socket.on('yf_price', data => {
    if (pane && pane.source !== 'hyperliquid' && _norm(pane.symbol) === _norm(data.symbol)) {
      pane.onPriceUpdate(data);
    }
  });

  // ── Symbol lists (needed by ChartPane) ─────────────────────────────────────
  const symbolLists = { forex: [], crypto: [] };
  fetch('/api/symbols/forex').then(r => r.json()).then(d => { symbolLists.forex = d; }).catch(() => {});
  fetch('/api/symbols/hyperliquid').then(r => r.json()).then(d => { symbolLists.crypto = d; }).catch(() => {});

  // ── Mount pane ──────────────────────────────────────────────────────────────
  const wrap = document.getElementById('popout-chart-wrap');
  const paneEl = document.createElement('div');
  paneEl.className = 'pane';
  wrap.appendChild(paneEl);

  const pane = new ChartPane(0, paneEl, socket, symbolLists, { source, symbol, interval });
  window._popPane = pane;

  // Re-apply theme to chart after pane initialises
  setTimeout(() => {
    const theme = localStorage.getItem('theme') || 'dark';
    applyTheme(theme);
  }, 300);

  // ── Alert permission ────────────────────────────────────────────────────────
  if (window.AlertEngine) AlertEngine.requestPermission();

  // ── Flyout helpers ──────────────────────────────────────────────────────────
  function _syncBackdrop() {
    const indOpen  = document.getElementById('indicator-flyout').classList.contains('open');
    const drawOpen = document.getElementById('drawing-flyout').classList.contains('open');
    document.getElementById('flyout-backdrop').classList.toggle('open', indOpen || drawOpen);
  }
  function closeFlyout() {
    document.getElementById('indicator-flyout').classList.remove('open');
    _syncBackdrop();
  }
  function closeDrawFlyout() {
    document.getElementById('drawing-flyout').classList.remove('open');
    _syncBackdrop();
  }

  document.getElementById('flyout-close').addEventListener('click', closeFlyout);
  document.getElementById('draw-flyout-close').addEventListener('click', closeDrawFlyout);
  document.getElementById('flyout-backdrop').addEventListener('click', () => { closeFlyout(); closeDrawFlyout(); });
  document.addEventListener('drawing-tool-exited', () => closeDrawFlyout());

  // ── Indicator flyout ────────────────────────────────────────────────────────
  function openFlyout() {
    const body = document.getElementById('flyout-body');
    body.innerHTML = '';
    window.INDICATOR_DEFS.forEach(group => {
      const groupEl = document.createElement('div');
      groupEl.className = 'indicator-group';
      const lbl = document.createElement('div');
      lbl.className = 'indicator-group-label';
      lbl.textContent = group.group;
      groupEl.appendChild(lbl);
      group.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'indicator-row';
        const cb  = document.createElement('div');
        cb.className = 'indicator-checkbox' + (pane.activeIndicators.has(item.id) ? ' checked' : '');
        const dot = document.createElement('div');
        dot.className = 'indicator-color-dot';
        dot.style.background = item.color;
        const nm = document.createElement('div');
        nm.className = 'indicator-name';
        nm.textContent = item.label;
        row.appendChild(cb); row.appendChild(dot); row.appendChild(nm);
        row.addEventListener('click', () => {
          cb.className = 'indicator-checkbox' + (pane.toggleIndicator(item.id) ? ' checked' : '');
        });
        groupEl.appendChild(row);
      });
      body.appendChild(groupEl);
    });
    document.getElementById('indicator-flyout').classList.add('open');
    _syncBackdrop();
  }

  // ── Drawing flyout ──────────────────────────────────────────────────────────
  const DRAW_TOOLS = [
    { tool: 'fib',   label: 'Fibonacci',
      svg: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="13" x2="13" y2="1" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="9" x2="13" y2="9" stroke="currentColor" stroke-width="1" stroke-dasharray="2,1"/><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1" stroke-dasharray="2,1"/><line x1="1" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="1" stroke-dasharray="2,1"/></svg>' },
    { tool: 'long',  label: 'Long',  color: '#00e676',
      svg: '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1,9 6,3 11,9" stroke="#00e676" stroke-width="1.8" fill="none"/></svg>' },
    { tool: 'short', label: 'Short', color: '#ff3d5a',
      svg: '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1,3 6,9 11,3" stroke="#ff3d5a" stroke-width="1.8" fill="none"/></svg>' },
    { tool: 'trend', label: 'Trendline',
      svg: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="13" x2="13" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="1.5" cy="12.5" r="1.5" fill="currentColor"/><circle cx="12.5" cy="1.5" r="1.5" fill="currentColor"/></svg>' },
    { tool: 'hline', label: 'Horizontal Line',
      svg: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="1.5" cy="7" r="1.5" fill="currentColor"/><circle cx="12.5" cy="7" r="1.5" fill="currentColor"/></svg>' },
    { tool: 'vline', label: 'Vertical Line',
      svg: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="1.5" r="1.5" fill="currentColor"/><circle cx="7" cy="12.5" r="1.5" fill="currentColor"/></svg>' },
  ];

  function openDrawFlyout() {
    closeFlyout();
    const body = document.getElementById('draw-flyout-body');
    body.innerHTML = '';

    const toolGroup = document.createElement('div');
    toolGroup.className = 'draw-tool-group';
    const toolLabel = document.createElement('div');
    toolLabel.className = 'indicator-group-label';
    toolLabel.textContent = 'TOOLS';
    toolGroup.appendChild(toolLabel);

    DRAW_TOOLS.forEach(def => {
      const row = document.createElement('div');
      row.className = 'draw-tool-row';
      const isActive = pane.drawingMode === def.tool;
      row.innerHTML = `
        <button class="draw-flyout-btn ${isActive ? 'active' : ''}" data-tool="${def.tool}">
          ${def.svg}<span>${def.label}</span>
        </button>`;
      const btn = row.querySelector('.draw-flyout-btn');
      if (def.color) btn.style.setProperty('--tool-color', def.color);
      btn.addEventListener('click', () => {
        pane.setDrawingTool(def.tool);
        body.querySelectorAll('.draw-flyout-btn').forEach(b => {
          const t = b.dataset.tool;
          const active = pane.drawingMode === t;
          b.classList.toggle('active', active);
          const d = DRAW_TOOLS.find(x => x.tool === t);
          b.style.color = (active && d && d.color) ? d.color : '';
        });
      });
      toolGroup.appendChild(row);
    });
    body.appendChild(toolGroup);

    const clearGroup = document.createElement('div');
    clearGroup.className = 'draw-tool-group';
    const clearLabel = document.createElement('div');
    clearLabel.className = 'indicator-group-label';
    clearLabel.textContent = 'ACTIONS';
    const clearRow = document.createElement('div');
    clearRow.className = 'draw-tool-row';
    clearRow.innerHTML = '<button class="draw-flyout-clear">&#x2715; Clear All Drawings</button>';
    clearRow.querySelector('.draw-flyout-clear').addEventListener('click', () => pane.clearAllDrawings());
    clearGroup.appendChild(clearLabel);
    clearGroup.appendChild(clearRow);
    body.appendChild(clearGroup);

    document.getElementById('drawing-flyout').classList.add('open');
    _syncBackdrop();
  }

  // Wire toolbar buttons on the pane element
  paneEl.addEventListener('click', e => {
    if (e.target.closest('.btn-indicators')) openFlyout();
    if (e.target.closest('.btn-draw-open')) openDrawFlyout();
  });

})();
</script>
</body>
</html>
